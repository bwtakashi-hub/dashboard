<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>志成リアルティ株式会社 ダッシュボード</title>
  <style>
    :root {
      --purple:        #7c3aed;
      --purple-hover:  #6d28d9;
      --disabled-bg:   #e2e8f0;
      --disabled-text: #94a3b8;
      --bg:            #f5f3ff;
      --surface:       #ffffff;
      --white:         #ffffff;
      --dark:          #0f172a;
      --radius:        12px;
      --radius-sm:     8px;
      --shadow:        0 2px 8px rgba(0,0,0,0.10);
      --shadow-hover:  0 8px 24px rgba(0,0,0,0.18);
      --transition:    0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Sans', 'Yu Gothic', 'Meiryo', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
      padding: 40px 16px 64px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 36px;
    }
    .page-header .badge {
      display: inline-block;
      background: var(--purple);
      color: var(--white);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      padding: 4px 16px;
      border-radius: 999px;
      margin-bottom: 12px;
    }
    .page-header h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: #3b1c7e;
    }
    .page-header p {
      margin-top: 6px;
      font-size: 0.86rem;
      color: #64748b;
    }
    .page-header .back {
      display: inline-block;
      margin-top: 12px;
      font-size: 0.8rem;
      color: #64748b;
      text-decoration: none;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 4px 14px;
      transition: background var(--transition);
    }
    .page-header .back:hover { background: #ede9fe; }

    .section {
      max-width: 860px;
      margin: 0 auto;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .section-label {
      padding: 13px 20px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #475569;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
    }
    .section-body {
      padding: 16px 20px 20px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .box {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 18px;
      border-radius: var(--radius-sm);
      border: none;
      font-family: inherit;
      font-size: 0.97rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
      box-shadow: var(--shadow);
      outline: none;
    }
    a.box:hover {
      transform: translateY(-3px) scale(1.01);
      box-shadow: var(--shadow-hover);
    }
    a.box:active { transform: translateY(0) scale(0.99); }

    .box-label { flex: 1; }
    .box-icon  { font-size: 1.2rem; flex-shrink: 0; }
    .box-arrow { font-size: 0.85rem; opacity: 0.7; flex-shrink: 0; }

    .box-purple {
      background: var(--purple);
      color: var(--white);
    }
    a.box-purple:hover { background: var(--purple-hover); }

    .box-disabled {
      background: var(--disabled-bg);
      color: var(--disabled-text);
      cursor: default;
      box-shadow: none;
    }

    @media (max-width: 620px) {
      body { padding: 24px 12px 48px; }
      .page-header h1 { font-size: 1.25rem; }
      .section-body { grid-template-columns: 1fr; }
      .box { font-size: 0.9rem; padding: 16px 14px; }
    }
  </style>
</head>
<body>

  <div class="page-header">
    <div class="badge">🏢 志成リアルティ株式会社</div>
    <h1>同盟関連 ダッシュボード</h1>
    <p>物件管理・書類・査定へのクイックアクセス</p>
    <a class="back" href="interface.html">← メインへ戻る</a>
  </div>

  <div class="section">
    <div class="section-label">🤝 同盟関連</div>
    <div class="section-body">

      <a class="box box-purple"
         href="https://drive.google.com/drive/folders/1z_xT6lMuCdEB7HJmWWByxpJ9sr_TqoZ4"
         target="_blank" rel="noopener noreferrer">
        <span class="box-icon">&#128193;</span>
        <span class="box-label">物件書類格納庫</span>
        <span class="box-arrow">&#x2197;</span>
      </a>

      <a class="box box-purple"
         href="https://docs.google.com/spreadsheets/d/13_jeQc7FYzX_TmDOlccVmgJfgCt-ujiWqEUeryt4S8I/edit?gid=1871889121#gid=1871889121"
         target="_blank" rel="noopener noreferrer">
        <span class="box-icon">&#127968;</span>
        <span class="box-label">同盟物件一覧（住まっぷ）</span>
        <span class="box-arrow">&#x2197;</span>
      </a>

      <a class="box box-purple"
         href="https://docs.google.com/spreadsheets/d/1BkKJpM93BUnbwyrZIYo6D_kOVuJKV9oGpyONOb_eCrs/edit?gid=423970402#gid=423970402"
         target="_blank" rel="noopener noreferrer">
        <span class="box-icon">&#128218;</span>
        <span class="box-label">同盟物件一覧（大元データ）</span>
        <span class="box-arrow">&#x2197;</span>
      </a>

      <a class="box box-purple"
         href="https://docs.google.com/spreadsheets/d/1Y2iu9hARYCBdDE1_TKBLvvVGiUFotDgftiu4O6uJgqQ/edit?gid=236163215#gid=236163215"
         target="_blank" rel="noopener noreferrer">
        <span class="box-icon">&#128269;</span>
        <span class="box-label">JKAS査定 依頼リスト</span>
        <span class="box-arrow">&#x2197;</span>
      </a>

      <a class="box box-purple"
         href="https://docs.google.com/spreadsheets/d/1nGW3UqCuRjZNO1veALNRYWz9EaTqzpa1gM-kUZQYztU/edit?gid=423970402#gid=423970402"
         target="_blank" rel="noopener noreferrer">
        <span class="box-icon">&#128196;</span>
        <span class="box-label">各種作成書類</span>
        <span class="box-arrow">&#x2197;</span>
      </a>

      <div class="box box-disabled" aria-disabled="true">
        <span class="box-icon">&#128337;</span>
        <span class="box-label">予備</span>
      </div>

    </div>
  </div>

</body>
</html>
